# Deploy Next.js (standalone) to Azure App Service on push to `main`.
#
# Prerequisites (GitHub → Settings → Secrets and variables):
#   - PROD_DATABASE_URL: production Postgres URL used by `prisma migrate deploy` during CI.
#
# Prerequisites (GitHub → Settings → Variables):
#   - AZURE_WEBAPP_NAME: same as the `name` parameter in your ARM Web App (e.g. citybuild-connect).
#   - AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID (OIDC service principal values)
#
# Azure Portal → Web App → Configuration → Application settings (runtime):
#   - WEBSITE_NODE_DEFAULT_VERSION = ~20 (or match your stack)
#   - Startup Command: node server.js
#   - DATABASE_URL, NEXTAUTH_URL, NEXTAUTH_SECRET, OAuth vars, etc.
#
# If zip deploy fails with 401/403: your ARM template sets basicPublishingCredentialsPolicies
# for scm/ftp to allow: false. Either allow SCM basic auth for publish-profile deploy, or
# switch this workflow to azure/login (OIDC) + webapps-deploy without a publish profile.

name: Deploy to Azure Web App

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: "20.x"

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('next.config.mjs', 'tsconfig.json', 'src/**/*.{js,jsx,ts,tsx}') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-

      - name: Validate Prisma schema
        run: npx prisma validate
        env:
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci?schema=public

      - name: Check required deployment config
        run: |
          set -euo pipefail
          if [ -z "${{ vars.AZURE_WEBAPP_NAME }}" ]; then
            echo "Missing required GitHub variable: AZURE_WEBAPP_NAME"
            exit 1
          fi
          if [ -z "${{ vars.AZURE_CLIENT_ID }}" ] || [ -z "${{ vars.AZURE_TENANT_ID }}" ] || [ -z "${{ vars.AZURE_SUBSCRIPTION_ID }}" ]; then
            echo "Missing required GitHub variables: AZURE_CLIENT_ID / AZURE_TENANT_ID / AZURE_SUBSCRIPTION_ID"
            exit 1
          fi

      - name: Guard schema changes require migration files
        run: |
          set -euo pipefail
          BASE_SHA="${{ github.event.before }}"
          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="$(git rev-parse HEAD~1 2>/dev/null || true)"
          fi

          if [ -n "$BASE_SHA" ]; then
            CHANGED_FILES="$(git diff --name-only "$BASE_SHA" "$GITHUB_SHA")"
          else
            CHANGED_FILES="$(git show --pretty='' --name-only "$GITHUB_SHA")"
          fi

          echo "Changed files since base:"
          echo "$CHANGED_FILES"

          if echo "$CHANGED_FILES" | grep -Eq '^prisma/schema\.prisma$'; then
            if ! echo "$CHANGED_FILES" | grep -Eq '^prisma/migrations/.+/migration\.sql$'; then
              echo "prisma/schema.prisma changed, but no migration SQL file was committed."
              echo "Run: prisma migrate dev --name <change-name> and commit prisma/migrations/*"
              exit 1
            fi
          fi

      # Prisma does not connect for `generate`; URL must exist for schema parsing.
      - name: Prisma generate
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci?schema=public

      - name: Build Next.js
        run: npm run build
        env:
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci?schema=public

      - name: Assemble standalone package
        run: |
          cp -r .next/static .next/standalone/.next/static
          if [ -d public ]; then
            cp -r public .next/standalone/public
          fi

      - name: Ensure production migration secret exists
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.PROD_DATABASE_URL }}" ]; then
            echo "Missing required GitHub secret: PROD_DATABASE_URL"
            exit 1
          fi

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Apply Prisma migrations (production)
        run: npm run db:deploy
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          package: .next/standalone
